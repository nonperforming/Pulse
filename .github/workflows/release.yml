name: Release Build
on: workflow_dispatch

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        configuration: ["BepInEx5", "BepInEx6"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          submodules: recursive

      - name: Cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget

      - name: Build client
        run: dotnet publish --configuration Release-${{ matrix.configuration }} --output build --verbosity normal

      # https://github.com/ebkr/r2modmanPlus/wiki/Structuring-your-Thunderstore-package#bepinex
      # TODO: Consider using tag name or pull version from .csproj
      - name: Organize plugin files
        run: |
          cd build
          mkdir --parents plugins/io.github.nonperforming.pulse
          mv io.github.nonperforming.pulse.dll plugins/io.github.nonperforming.pulse
          zip --recurse-paths ../io.github.nonperforming.pulse-${{ matrix.configuration }}.zip plugins

      - name: Upload client plugin
        uses: actions/upload-artifact@v7.0.1
        with:
          path: io.github.nonperforming.pulse-${{ matrix.configuration }}.zip
          if-no-files-found: error
          archive: false # otherwise GitHub will zip the zip


        # When we get on Thunderstore, upload the artifact zip here.
